<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YANTO PROXY - Bypass Blokir</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#0a0f1e;color:#fff;padding:20px}
        .container{max-width:800px;margin:0 auto}
        .header{text-align:center;margin-bottom:30px}
        .header h1{color:#f59e0b;font-size:2rem}
        .url-form{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .url-form input{flex:1;padding:15px;border:none;border-radius:12px;background:#1e293b;color:#fff;font-size:1rem}
        .url-form button{padding:15px 25px;background:#f59e0b;border:none;border-radius:12px;color:#000;font-weight:bold;cursor:pointer}
        .options{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
        .options label{display:flex;align-items:center;gap:8px;cursor:pointer}
        .proxy-frame{background:#fff;border-radius:12px;overflow:hidden;min-height:600px;display:none}
        iframe{width:100%;height:80vh;border:none}
        .loading{text-align:center;padding:50px;display:none}
        .spinner{width:40px;height:40px;border:4px solid #333;border-top-color:#f59e0b;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .footer{text-align:center;margin-top:30px;color:#64748b;font-size:0.8rem}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 YANTO PROXY</h1>
            <p>Bypass blokir • Hemat kuota • Aman & Cepat</p>
        </div>

        <div class="url-form">
            <input type="text" id="urlInput" placeholder="Masukkan URL (contoh: https://google.com)">
            <button id="goBtn">🚀 BUKA</button>
        </div>

        <div class="options">
            <label><input type="checkbox" id="textMode"> 📄 Mode Teks (hemat kuota)</label>
            <label><input type="checkbox" id="compressMode"> 🗜️ Kompresi (beta)</label>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Memuat website...</p>
        </div>

        <div id="frameContainer" class="proxy-frame">
            <iframe id="proxyFrame"></iframe>
        </div>

        <div class="footer">
            🔒 Privasi terjaga • Gak ada log • YANTO PROXY
        </div>
    </div>

    <script>
        const apiUrl = '/api/proxy';
        const goBtn = document.getElementById('goBtn');
        const urlInput = document.getElementById('urlInput');
        const frameContainer = document.getElementById('frameContainer');
        const proxyFrame = document.getElementById('proxyFrame');
        const loading = document.getElementById('loading');
        const textMode = document.getElementById('textMode');
        const compressMode = document.getElementById('compressMode');

        goBtn.addEventListener('click', async () => {
            let url = urlInput.value.trim();
            if (!url) {
                alert('Masukkan URL dulu!');
                return;
            }
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            loading.style.display = 'block';
            frameContainer.style.display = 'none';

            try {
                const proxyUrl = `${apiUrl}?url=${encodeURIComponent(url)}&textOnly=${textMode.checked}&compress=${compressMode.checked}`;
                proxyFrame.src = proxyUrl;
                frameContainer.style.display = 'block';
                proxyFrame.onload = () => {
                    loading.style.display = 'none';
                };
            } catch (err) {
                loading.style.display = 'none';
                alert('Error: ' + err.message);
            }
        });

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') goBtn.click();
        });
    </script>
</body>
</html>
